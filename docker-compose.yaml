services:
  sqlbot:
    image: "${SQLBOT_IMAGE:-dataease/sqlbot}"
    container_name: sqlbot
    restart: always
    privileged: true
    networks:
      - sqlbot-network
    ports:
      - 8000:8000
      - 8001:8001
    environment:
      # Database configuration
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: sqlbot
      POSTGRES_USER: root
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-Password123@pg}"
      # Project basic settings
      PROJECT_NAME: "星通智数"
      DEFAULT_PWD: "${DEFAULT_PWD:-SQLBot@123456}"
      # MCP settings
      SERVER_IMAGE_HOST: "${SERVER_IMAGE_HOST:-http://YOUR_SERVE_IP:MCP_PORT/images/}"
      # Auth & Security
      SECRET_KEY: "${SECRET_KEY:-y5txe1mRmS_JpOrUzFzHEu-kIQn3lf7ll0AOv9DQh0s}"
      # CORS settings
      FRONTEND_HOST: "${FRONTEND_HOST:-http://localhost:5173}"
      BACKEND_CORS_ORIGINS: "${BACKEND_CORS_ORIGINS:-http://localhost,http://localhost:5173,http://10.1.5.193:5173,https://localhost,https://localhost:5173}"
      # Logging
      LOG_LEVEL: "INFO"
      LOG_DIR: "/opt/sqlbot/app/logs"
      LOG_FORMAT: "%(asctime)s - %(name)s - %(levelname)s:%(lineno)d - %(message)s"
      SQL_DEBUG: False
    volumes:
      - ./data/sqlbot/excel:/opt/sqlbot/data/excel
      - ./data/sqlbot/file:/opt/sqlbot/data/file
      - ./data/sqlbot/images:/opt/sqlbot/images
      - ./data/sqlbot/logs:/opt/sqlbot/app/logs
      - ./data/postgresql:/var/lib/postgresql/data

networks:
  sqlbot-network:
